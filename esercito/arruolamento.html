<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arruolati nell'Esercito di Aspakei</title>
    <style>
        /* Reset base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Header e Navigazione */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

            header .logo {
                font-size: 1.5rem;
                font-weight: bold;
                color: #0055a5;
            }

        nav ul {
            list-style: none;
            display: flex;
        }

            nav ul li {
                margin-left: 1.5rem;
            }

                nav ul li a {
                    text-decoration: none;
                    color: #333;
                    transition: color 0.3s ease;
                }

                    nav ul li a:hover {
                        color: #0055a5;
                    }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img.flag {
            width: 40px;
            height: auto;
            margin-right: 10px;
        }
        
        /* Sezione Hero con Parallax */
        .hero {
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
}

.video-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

            .hero::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1;
            }

            .hero h1 {
                font-family: "Merriweather", serif;
                position: relative;
                z-index: 2;
                font-size: 3rem;
                color: #fff;
                text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
                animation: fadeInDown 1s ease-out;
                margin: 0 1rem;
                -webkit-text-stroke-width: 1px;
                -webkit-text-stroke-color: #f0e3d5;
            }

        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }


        /* Main Content */
        main {
            padding: 120px 20px 20px; /* Lascia spazio per l'header fisso */
        }

            main h1 {
                text-align: center;
                margin-bottom: 1rem;
                animation: fadeInDown 1s ease-out;
            }

            .content {
            position: relative;
            z-index: 2;
            padding: 50px;
            max-width: 600px;
            margin: 100px auto;
            
        }
        .audio-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .audio-button:hover {
            background: rgba(255, 0, 0, 0.7);
        }
        input, select, textarea, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            background: rgba(0, 0, 0, 0.7);
            color: white;
        }
        button {
            background: red;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: darkred;
        }
        label {
            display: block;
            margin: 10px 0;
        }
    </style>
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../flag.png" alt="Bandiera di Aspakei" class="flag">
            Aspakei
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="#">Contatti</a></li>
            </ul>
        </nav>
    </header>
<section class="hero">
    <video id="bg-video" class="video-background" autoplay loop playsinline muted>
        <source src="video_esercito.mp4" type="video/mp4">
        Il tuo browser non supporta il tag video.
    </video>
</section>

<button class="audio-button" onclick="toggleAudio()">🔊 Attiva Audio</button>

<div class="content">
    <h1>Arruolati nell'Esercito di Aspakei</h1>
    <form onsubmit="return showError()">
        <input type="text" placeholder="Nome e Cognome" required>
        <input type="date" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Numero di telefono" required>
        <input type="text" placeholder="Indirizzo di residenza" required>
        <input type="text" placeholder="Cittadinanza" required>
        <input type="text" placeholder="Titolo di studio" required>
        <select required>
            <option value="">Seleziona un corpo</option>
            <option value="fanteria">Fanteria</option>
            <option value="cavalleria">Fanteria corazzata</option>
            <option value="artiglieria">Artiglieria</option>
            <option value="genio">Aeronautica</option>
            <option value="speciali">Marina</option>
            <option value="aeronautica">Intelligence</option>
            <option value="marina">Medico di campo</option>
        </select>
        <textarea placeholder="Esperienze militari pregresse (se presenti)" rows="4"></textarea>
        <textarea placeholder="Motivazione per l'arruolamento" rows="4" required></textarea>
        <label>
            <input type="checkbox" required> Dichiaro di non avere precedenti penali e di essere idoneo al servizio militare
        </label>
        <label>
            <input type="checkbox" required> Accetto i termini e le condizioni dell'arruolamento
        </label>
        <button type="submit">Invia Candidatura</button>
    </form>
</div>

<script>
    function showError() {
        alert("Errore durante l'invio della candidatura. Riprova più tardi.");
        return false;
    }

    function toggleAudio() {
            var video = document.getElementById("bg-video");
            var button = document.querySelector(".audio-button");
            if (video.muted) {
                video.muted = false;
                button.textContent = "🔇 Disattiva Audio";
            } else {
                video.muted = true;
                button.textContent = "🔊 Attiva Audio";
            }
        }
</script>
</body>
</html>
